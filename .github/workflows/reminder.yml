name: Daily task reminder

on:
  schedule:
    # 2:05 UTC = 8:05 am Asia/Dhaka (UTC+6).
    # Deliberately NOT on the exact hour — GitHub documents that jobs
    # scheduled exactly on the hour are more likely to be delayed or
    # dropped during high-load periods. A few minutes past avoids that.
    - cron: "5 2 * * *"
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run check
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
